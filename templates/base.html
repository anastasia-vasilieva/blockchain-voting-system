<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Блокчейн-голосование</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            overflow: hidden;
        }
        .header {
            background: #2c3e50;
            color: white;
            padding: 20px 30px;
            text-align: center;
        }
        .header h1 {
            margin-bottom: 10px;
        }
        .nav {
            background: #34495e;
            padding: 10px;
            text-align: center;
        }
        .nav a {
            color: white;
            text-decoration: none;
            margin: 0 15px;
            padding: 8px 16px;
            border-radius: 25px;
            transition: background 0.3s;
            display: inline-block;
        }
        .nav a:hover {
            background: #2c7cb6;
        }
        .content {
            padding: 30px;
        }
        .footer {
            background: #ecf0f1;
            text-align: center;
            padding: 15px;
            font-size: 0.8em;
            color: #7f8c8d;
        }
        button, .button {
            background: #2c7cb6;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 25px;
            cursor: pointer;
            font-size: 16px;
            transition: background 0.3s;
        }
        button:hover {
            background: #1f6392;
        }
        input, select {
            padding: 10px;
            margin: 10px 0;
            border: 1px solid #ddd;
            border-radius: 25px;
            width: 100%;
            max-width: 300px;
        }
        .message {
            padding: 15px;
            margin: 20px 0;
            border-radius: 10px;
        }
        .success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }
        .error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🗳️ Блокчейн-голосование</h1>
            <p>Прозрачные и неизменяемые выборы на технологии блокчейн</p>
        </div>
        <div class="nav">
            <a href="/">🏠 Главная</a>
            <a href="/register">📝 Регистрация</a>
            <a href="/vote">🗳️ Голосование</a>
            <a href="/results">📊 Результаты</a>
            <a href="/chain">⛓️ Блокчейн</a>
        </div>
        <div class="content">
            {% block content %}{% endblock %}
        </div>
        <div class="footer">
            🔒 Все голоса защищены криптографией | Токены шифруются | Блокчейн проверяет целостность
        </div>
    </div>
</body>
</html>
